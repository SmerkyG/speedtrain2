model:
  model_class_path: model.gpt2_kvm.GPT
  vocab_size: 50304
  n_head: 12
  use_skip_connections: 0
  use_block_lambdas: 0 
  logit_softcap: 0
  use_l2wrap: 0
  use_tokenshift_att: 0
  use_tokenshift_ffn: 1
  rope_partial_dim: 32 # because we're using 64 headsize here

train:
  warmup_iters: 10
  warmdown_type: cos
  data_packing: 0 #1
  train_dataset: 'robbiegwaldd/dclm-10B' #"data/fineweb10B/fineweb_train_*.bin"
  val_dataset: 'robbiegwaldd/dclm-10B' #"data/fineweb10B/fineweb_val_*.bin"
  device_batch_size: 16 #64
  sequence_length: 4096 #1024
  num_iterations: 3000
  warmdown_iters: 3000
  warmdown_min_ratio: 0.1
  weight_decay: 0.001
  wandb: speedtrain_adam
  opts:
    'matrix_params': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'wte_embed': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'lm_head': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'scalars': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'scalars2': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'scalars3': 
      opt: 'adam'
      lr: 0.0012
      beta1: 0.9
      beta2: 0.99
