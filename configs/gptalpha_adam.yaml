model:
  model_class_path: model.gptalpha.GPT
  vocab_size: 50304
  n_head: 6
  use_skip_connections: 0
  use_block_lambdas: 0 
  logit_softcap: 0
  use_l2wrap: 0
  use_tokenshift_att: 1
  use_tokenshift_ffn: 1
  rope_partial_dim: 64 # because we're using 128 headsize here

train:
  warmup_iters: 50
  warmdown_type: cos
  train_dataset: 'robbiegwaldd/dclm-10B' #"data/fineweb10B/fineweb_train_*.bin"
  val_dataset: 'robbiegwaldd/dclm-10B' #"data/fineweb10B/fineweb_val_*.bin"
  data_packing: 'varlen'
  device_batch_size: 1
  sequence_length: 65536
  max_document_length: 4096
  val_device_batch_size: 1
  #val_sequence_length: 4096
  num_iterations: 3000
  warmdown_iters: 3000
  warmdown_min_ratio: 0.1
  weight_decay: 0.001
  wandb: speedtrain_adam
  opts:
    'matrix_params': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'wte_embed': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'lm_head': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'scalars': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'scalars2': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'scalars3': 
      opt: 'adam'
      lr: 0.0012
      beta1: 0.9
      beta2: 0.99
