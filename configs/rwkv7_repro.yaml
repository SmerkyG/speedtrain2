model:
  model_class_path: model.rwkv7.GPT
  vocab_size: 65536
  n_head: 12
  use_skip_connections: 0
  use_block_lambdas: 0 
  logit_softcap: 0
  use_l2wrap: 1
  use_tokenshift_att: 1
  use_tokenshift_ffn: 1

train:
  warmup_iters: 10
  warmdown_type: cos
  data_packing: 1
  train_dataset: "data/minipile_rwkv/minipile_rwkv_train_*.bin"
  val_dataset: "data/minipile_rwkv/minipile_rwkv_val_*.bin"
  device_batch_size: 16
  sequence_length: 1024
  num_iterations: 12000
  warmdown_iters: 12000
  warmdown_min_ratio: 0.1
  weight_decay: 0.001
  wandb: Test2
  opts:
    'matrix_params': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'wte_embed': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'lm_head': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'scalars': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
    'scalars2': 
      opt: 'adam'
      lr: 0.0006
      beta1: 0.9
      beta2: 0.99
